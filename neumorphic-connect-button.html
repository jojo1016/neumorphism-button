<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拟态连接按钮 - 超真实效果</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #18181f;
    font-family: 'SF Pro Display', -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
    overflow: hidden;
  }

  /* 背景微光 */
  body::after {
    content: '';
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(80,80,120,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .scene {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  /* ============================================================
     底层轮廓 — 渐变背景
     四层内阴影 + 两层外阴影
     ============================================================ */
  .base {
    position: relative;
    width: 300px;
    height: 150px;
    border-radius: 75px;
    background: linear-gradient(160deg, #2c2c38 0%, #22222e 100%);
    box-shadow:
      /* — 外阴影 — */
      10px 10px 24px rgba(0,0,0,0.55),         /* 1. 右下深影 */
      -6px -6px 16px rgba(255,255,255,0.025),   /* 2. 左上微亮 */
      /* — 内阴影 — */
      inset  5px  5px 10px rgba(0,0,0,0.45),    /* 3. 右下凹陷 */
      inset -4px -4px  8px rgba(255,255,255,0.05),/* 4. 左上反光 */
      inset  0   0   24px rgba(0,0,0,0.25),     /* 5. 整体柔凹 */
      inset  0  -3px  6px rgba(0,0,0,0.35);     /* 6. 底沿加深 */
    transition: box-shadow .4s ease;
  }

  /* ============================================================
     中间缝隙层 — 单独一层 + 两层阴影强化凹陷感
     ============================================================ */
  .groove {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 232px;
    height: 86px;
    border-radius: 43px;
    background: linear-gradient(160deg, #1c1c27, #181822);
    box-shadow:
      inset  4px  4px  8px rgba(0,0,0,0.65),
      inset -3px -3px  5px rgba(255,255,255,0.03);
    z-index: 1;
  }

  /* ============================================================
     按键主体 — 顶部纯色 + 底部两层阴影构建体积
     ============================================================ */
  .key {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 212px;
    height: 68px;
    border-radius: 34px;
    background: linear-gradient(180deg, #e9e9ee 0%, #d5d5da 100%);
    z-index: 2;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow:
      0 8px 16px rgba(0,0,0,0.45),   /* 阴影1：体积 */
      0 4px  6px rgba(0,0,0,0.35);   /* 阴影2：接触 */
    transition:
      transform .18s cubic-bezier(.36,.07,.19,.97),
      box-shadow  .18s cubic-bezier(.36,.07,.19,.97),
      background  .18s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* 按键表面高光 */
  .key::before {
    content: '';
    position: absolute;
    top: 3px; left: 12%;
    width: 76%; height: 38%;
    border-radius: 34px;
    background: linear-gradient(180deg, rgba(255,255,255,0.45), transparent);
    pointer-events: none;
  }

  /* ============================================================
     圆形阴影遮罩 — 整体上方
     ============================================================ */
  .overlay {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 212px;
    height: 68px;
    border-radius: 34px;
    background: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.025) 0%, transparent 55%);
    box-shadow: inset 0 -10px 20px rgba(0,0,0,0.12);
    z-index: 3;
    pointer-events: none;
  }

  /* ============================================================
     指示灯 — 灰度滤镜控制亮灭
     ============================================================ */
  .indicator {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4ade80;
    z-index: 5;
    filter: grayscale(1) brightness(0.35);
    transition: filter .5s ease, box-shadow .5s ease;
  }

  /* ============================================================
     文字
     ============================================================ */
  .label {
    position: relative;
    z-index: 4;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #5a5a68;
    pointer-events: none;
    display: flex;
    overflow: hidden;
  }

  .label .c {
    display: inline-block;
    will-change: transform, opacity;
  }

  /* ============================================================
     底部三个光源
     ============================================================ */
  .lights {
    display: flex;
    gap: 20px;
    align-items: center;
    justify-content: center;
    height: 16px;
  }

  .bulb {
    position: relative;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4ade80;
    filter: grayscale(1) brightness(0.2);
    opacity: .25;
    transition: filter .5s ease, opacity .5s ease;
  }
  .bulb:nth-child(2) { width: 9px; height: 9px; }

  /* ============================================================
     底部状态文字
     ============================================================ */
  .status {
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.12);
    transition: color .5s ease;
    height: 18px;
    display: flex;
    align-items: center;
    overflow: hidden;
  }
  .status .c {
    display: inline-block;
    will-change: transform, opacity;
  }

  /* ============================================================
     底部光晕
     ============================================================ */
  .glow {
    position: absolute;
    bottom: -24px; left: 50%;
    transform: translateX(-50%);
    width: 180px; height: 36px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(74,222,128,0.12) 0%, transparent 70%);
    opacity: 0;
    transition: opacity .8s ease;
    pointer-events: none;
  }

  /* ==========================================================
     激活状态
     ========================================================== */
  .scene.on .key {
    transform: translate(-50%, -50%) scale(0.93) translateY(4px);
    box-shadow:
      0 3px 6px rgba(0,0,0,0.55),
      0 1px 3px rgba(0,0,0,0.45);
    background: linear-gradient(180deg, #dcdce1, #cbcbd0);
  }

  .scene.on .indicator {
    filter: grayscale(0) brightness(1);
    box-shadow:
      0 0 6px rgba(74,222,128,0.7),
      0 0 18px rgba(74,222,128,0.3);
  }

  .scene.on .bulb {
    filter: grayscale(0) brightness(1);
    opacity: 1;
    animation: pulse 1.6s ease-in-out infinite;
  }
  .scene.on .bulb:nth-child(1) { animation-delay: 0s; }
  .scene.on .bulb:nth-child(2) { animation-delay: .12s; }
  .scene.on .bulb:nth-child(3) { animation-delay: .24s; }

  .scene.on .status { color: rgba(74,222,128,0.55); }

  .scene.on .glow {
    opacity: 1;
    animation: glowB 2.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: .65; transform: scale(1); }
    50%     { opacity: 1;   transform: scale(1.35); }
  }
  @keyframes glowB {
    0%,100% { opacity: .45; transform: translateX(-50%) scale(1); }
    50%     { opacity: 1;   transform: translateX(-50%) scale(1.12); }
  }

  /* ==========================================================
     文字波浪切换动画
     ========================================================== */
  @keyframes waveOut {
    0%   { transform: translateY(0);    opacity: 1; }
    40%  { transform: translateY(-10px); opacity: 0; }
    100% { transform: translateY(-10px); opacity: 0; }
  }
  @keyframes waveIn {
    0%   { transform: translateY(10px); opacity: 0; }
    60%  { transform: translateY(10px); opacity: 0; }
    100% { transform: translateY(0);    opacity: 1; }
  }
</style>
</head>
<body>

<div class="scene" id="scene">

  <!-- 外壳 -->
  <div class="base">
    <div class="groove"></div>
    <div class="key" id="key">
      <div class="label" id="label"></div>
    </div>
    <div class="overlay"></div>
    <div class="indicator"></div>
    <div class="glow"></div>
  </div>

  <!-- 三个光源 -->
  <div class="lights">
    <div class="bulb"></div>
    <div class="bulb"></div>
    <div class="bulb"></div>
  </div>

  <!-- 状态文字 -->
  <div class="status" id="status"></div>

</div>

<script>
  const scene  = document.getElementById('scene');
  const key    = document.getElementById('key');
  const labelE = document.getElementById('label');
  const statusE= document.getElementById('status');

  let on = false, busy = false;

  /* ---------- 文字工具 ---------- */
  function buildChars(el, txt) {
    el.innerHTML = '';
    [...txt].forEach((ch, i) => {
      const s = document.createElement('span');
      s.className = 'c';
      s.textContent = ch === ' ' ? '\u00A0' : ch;
      el.appendChild(s);
    });
  }

  function waveReplace(el, newTxt, delayBase) {
    const old = el.querySelectorAll('.c');
    old.forEach((c, i) => {
      c.style.animation = `waveOut .3s ${i * 35}ms ease forwards`;
    });
    const t = old.length * 35 + 300;
    setTimeout(() => {
      buildChars(el, newTxt);
      el.querySelectorAll('.c').forEach((c, i) => {
        c.style.animation = `waveIn .35s ${i * 35 + (delayBase||0)}ms ease forwards`;
      });
    }, t);
  }

  /* ---------- 初始化 ---------- */
  buildChars(labelE,  'Connect');
  buildChars(statusE, 'tap to connect');

  /* ---------- 点击 ---------- */
  key.addEventListener('click', () => {
    if (busy) return;
    busy = true;

    if (!on) {
      scene.classList.add('on');
      waveReplace(labelE,  'Connected', 0);
      setTimeout(() => waveReplace(statusE, 'connected', 0), 150);
      on = true;
    } else {
      scene.classList.remove('on');
      waveReplace(labelE,  'Connect', 0);
      setTimeout(() => waveReplace(statusE, 'tap to connect', 0), 150);
      on = false;
    }
    setTimeout(() => busy = false, 700);
  });

  /* ---------- 按键物理反馈 ---------- */
  key.addEventListener('mousedown', () => {
    if (!on) key.style.transform = 'translate(-50%,-50%) scale(.96) translateY(2px)';
  });
  key.addEventListener('mouseup', () => {
    if (!on) key.style.transform = 'translate(-50%,-50%)';
  });
  key.addEventListener('mouseleave', () => {
    if (!on) key.style.transform = 'translate(-50%,-50%)';
  });
</script>

</body>
</html>
